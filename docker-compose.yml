services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: byopstudio_ibps

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "byopstudio_ibps"
      MOCK_DB: "false"
      CORS_ORIGINS: "*"
    depends_on:
      - mongodb

volumes:
  mongo_data:
